<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Email Automation System</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
}

.container{
width:500px;
margin:80px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
background:#e8f5e9;
padding:10px;
border-radius:5px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Email Automation</h2>

<input id="sender" placeholder="Sender Email">

<input id="subject" placeholder="Email Subject">

<textarea id="body" rows="5" placeholder="Email Message"></textarea>

<button onclick="sendEmail()">Send Email</button>

<div class="result" id="result">

<p><b>Category:</b> <span id="category"></span></p>
<p><b>Auto Reply:</b></p>
<p id="reply"></p>

</div>

</div>

<script>

function sendEmail(){

let sender=document.getElementById("sender").value
let subject=document.getElementById("subject").value
let body=document.getElementById("body").value

fetch("/process",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
sender:sender,
subject:subject,
body:body
})

})

.then(res=>res.json())

.then(data=>{

document.getElementById("result").style.display="block"

document.getElementById("category").innerText=data.category

document.getElementById("reply").innerText=data.reply

})

}

</script>

</body>
</html>
